repos:
  - repo: local
    hooks:
      - id: ruff-format
        name: ruff format
        entry: python -m ruff format
        language: system
        types: [python]
      - id: ruff-check
        name: ruff check
        entry: python -m ruff check
        language: system
        types: [python]
      - id: unit-tests
        name: unit tests
        entry: python -m unittest discover -s tests -v
        language: system
        pass_filenames: false
        always_run: true
