[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "mini-codex"
version = "0.1.0"
description = "A small terminal coding assistant powered by OpenRouter."
readme = "README.md"
requires-python = ">=3.9"
dependencies = [
  "openai>=2.0.0,<3.0.0",
]

[project.scripts]
mini-codex = "main:main"

[tool.setuptools]
py-modules = ["main"]
